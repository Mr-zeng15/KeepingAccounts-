<html>
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
    <meta name="viewport"
          content="width=device-width,initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <script type="text/javascript">
        function modifyTitle() {
            var json = {
                "action" : 0,
                "parameters": {
                    "title" : "修改的标题"
                }
            };
            shark_android.SKFunc(JSON.stringify(json));
        }
        function copy() {
            var json = {
                "action": 3,
                "parameters": {
                    "content" : "复制的内容",
                }
            }
            shark_android.SKFunc(JSON.stringify(json))
        }
        function skipWebView() {
            var json = {
                    "action": 1,
                    "parameters": {
                       "title" : "跳转webview的标题",
                       "url" : "http://www.baidu.com",
                       "hideNavRightItem" : 1
                    }
            }
            shark_android.SKFunc(JSON.stringify(json))
        }
        function skip() {
            var json = {
                "action": 4,
                "parameters": {
                    "scheme" : "",
                    "platform" : 0
                }
            }
            shark_android.SKFunc(JSON.stringify(json))
        }

        function skipToDetail() {
            var json = {
                "action": 2,
                "parameters": {
                    "module" : "SelectedIndex",
                    "parameters" : 0
                }
            }
            shark_android.SKFunc(JSON.stringify(json))
        }

        function skipToSubDetail() {
            var json = {
                "action": 2,
                "parameters": {
                    "module" : "Detail",
                    "parameters" : "1"
                }
            }
            shark_android.SKFunc(JSON.stringify(json))
        }

        function skipToBill() {
            var json = {
                "action": 2,
                "parameters": {
                    "module" : "BillList",
                    "parameters" : "1"
                }
            }
            shark_android.SKFunc(JSON.stringify(json))
        }


    </script>
</head>
<body>
<h1>
    SKFun Demo
</h1>
<input type="button" value="修改标题" onclick="modifyTitle()"/>
<input type="button" value="拷贝" onclick="copy()"/>
<input type="button" value="跳转WebView" onclick="skipWebView()"/>
<input type="button" value="跳转微信" onclick="skip()"/>
<input type="button" value="跳转到明细" onclick="skipToDetail()"/>
<input type="button" value="跳转到明细子页面" onclick="skipToSubDetail()"/>
<input type="button" value="跳转到账单" onclick="skipToBill()"/>
</body>
</html>
