<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="content-type" content="text/html;charset=utf-8"/>
    <meta id="viewport" name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"/>
    <style>
    * {
        padding: 0;
        margin: 0
    }
    .box{
        display: flex;
        flex-direction: column;
        align-content: center;
    }
    img{
        margin: 43px auto 8px;
    }
    .box div{
        text-align: center;
        color: #cecece;
        font-size: 14px;
    }
    input {
        font-size: 16px;
        color: #343233;
        width: 120px;
        height: 45px;
        background-color: #ffda44;
        border-radius: 23px;
        margin-top: 27px;
        border:none;
        outline:none; 
    }
    input:active{
        background-color: #f8cd1d;
    }

    </style>
    <title>加载失败</title>
</head>

<body>
<div class="box">
    <img width="110px" height="97px" src="file:///android_asset/img/net_error_icon.png">
    <div>加载失败</div>
    <div style="width: 100%">
        <input type="button" value="重试" onClick="reload()"/>
    </div>
</body>
<script type="text/javascript">
    function reload(){
        shark_android.reloadPage();
    }

</script>

</html>
